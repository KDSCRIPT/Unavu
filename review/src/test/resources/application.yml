spring:
  application:
    name: review
  profiles:
    active: test
  cloud:
    config:
      enabled: false
    kubernetes:
      discovery:
        enabled: false
    discovery:
      client:
        health-indicator:
          enabled: false
    stream:
      binders:
        rabbit:
          type: rabbit
      default-binder: rabbit
      bindings:
        notification-events-out-0:
          destination: notification-events
          content-type: application/json
          binder: rabbit
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop