deploymentName: review
appLabel: review
appName: review

replicaCount: 1

image:
  repository: containedtogether/review
  tag: latest

containerPort: 8081

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081
global:
  configMapName: unavu-configmap

startupProbe:
  failureThreshold: 30
  periodSeconds: 10

readinessProbe:
  periodSeconds: 30

livenessProbe:
  periodSeconds: 30

