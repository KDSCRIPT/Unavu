deploymentName: notification
appLabel: notification
appName: notification

replicaCount: 1

image:
  repository: containedtogether/notification
  tag: latest

containerPort: 9010

service:
  type: ClusterIP
  port: 9010
  targetPort: 9010
global:
  configMapName: unavu-configmap

startupProbe:
  failureThreshold: 30
  periodSeconds: 10

readinessProbe:
  periodSeconds: 30

livenessProbe:
  periodSeconds: 30

