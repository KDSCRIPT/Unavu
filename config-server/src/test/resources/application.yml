spring:
  application:
    name: "config-server"
  profiles:
    active: test
  cloud:
    config:
      server:
        git:
          uri: https://github.com/dummy/dummy-config-repo
          username: dummy-user
          password: dummy-token
          default-label: config
          searchPaths:
            - dev
          timeout: 5
          clone-on-start: false   # <-- important: don't try to actually clone in tests
          force-pull: false
  rabbitmq:
    host: localhost
    username: guest
    password: guest
    port: 5672

management:
  health:
    rabbit:
      enabled: false   # <-- avoid failing context load on an unreachable broker

encrypt:
  key: dummy-test-encryption-key-1234567890

server:
  port: 8071