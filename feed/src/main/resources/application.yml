server:
  port: 9011

spring:
  application:
    name: feed

  profiles:
    active: ${PROFILE_ACTIVE}
  config:
    import: optional:configserver:http://localhost:8071/

  cloud:
    function:
      definition: feedConsumer
    openfeign:
      circuitbreaker:
        enabled: true
    stream:
      bindings:
        feedConsumer-in-0:
          destination: feed-events
          group: ${spring.application.name}
          content-type: application/json
      kafka:
        binder:
          brokers:
            - ${KAFKA_HOSTNAME:localhost}:9092

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka