global:
  scrape_interval:     5s # Set the scrape interval to every 5 seconds.
  evaluation_interval: 5s # Evaluate rules every 5 seconds.

scrape_configs:
  - job_name: 'review'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'review:8081' ]
  - job_name: 'user'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'user:8082' ]
  - job_name: 'social-graph'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'social-graph:8083' ]
  - job_name: 'list'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'list:8084' ]
  - job_name: 'restaurant'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'restaurant:8085' ]
  - job_name: 'gateway-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'gateway-server:8072' ]
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'eureka-server:8070' ]
  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'config-server:8071' ]