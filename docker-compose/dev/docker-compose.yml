services:
  read:
    image: grafana/loki:2.9.4
    command: "-config.file=/etc/loki/config.yaml -target=read"
    ports:
      - 3101:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    depends_on:
      - minio
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks: &loki-dns
      unavu:
        aliases:
          - loki

  write:
    image: grafana/loki:2.9.4
    command: "-config.file=/etc/loki/config.yaml -target=write"
    ports:
      - 3102:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - minio
    networks:
      <<: *loki-dns

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ../observability/alloy/alloy-local-config.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - 12345:12345
    depends_on:
      - gateway
    extends:
      file: common-config.yml
      service: network-deploy-service
      #replace Loki network with config

  minio:
    image: minio/minio
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - 9000
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extends:
      file: common-config.yml
      service: network-deploy-service

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: -config.file /etc/tempo-config.yml
    ports:
      - "3110:3100"
      - "4318:4318"
    volumes:
      - ../observability/tempo/tempo.yml:/etc/tempo-config.yml
    extends:
      file: common-config.yml
      service: network-deploy-service

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    volumes:
      - ../observability/grafana/provisioning/datasource/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ../observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ../observability/grafana/provisioning/alerts/alerts.yml:/etc/grafana/provisioning/alerting/alerts.yml
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  backend:
    image: grafana/loki:2.9.4
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml -target=backend -legacy-read-mode=false"
    depends_on:
      - gateway
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service
  gateway:
    image: nginx:latest
    depends_on:
      - read
      - write
    entrypoint:
      - sh
      - -euc
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        user  nginx;
        worker_processes  5;  ## Default: 1

        events {
          worker_connections   1000;
        }

        http {
          resolver 127.0.0.11;

          server {
            listen             3100;

            location = / {
              return 200 'OK';
              auth_basic off;
            }

            location = /api/prom/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /api/prom/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /api/prom/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }

            location = /loki/api/v1/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /loki/api/v1/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /loki/api/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
          }
        }
        EOF
        /docker-entrypoint.sh nginx -g "daemon off;"
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: 8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: false
    extends:
      file: common-config.yml
      service: microservice-base-config
  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      timeout: 10s
      retries: 10
    extends:
      file: common-config.yml
      service: network-deploy-service

  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    extends:
      file: common-config.yml
      service: network-deploy-service

  config-server:
    image: "containedtogether/config-server"
    container_name: config-server
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    environment:
      CONFIG_REPO_URL: ${CONFIG_REPO_URL}
      CONFIG_REPO_USERNAME: ${CONFIG_REPO_USERNAME}
      CONFIG_REPO_PASSWORD: ${CONFIG_REPO_PASSWORD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RABBITMQ_HOST: rabbit
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      OTEL_SERVICE_NAME: "config-server"
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    extends:
      file: common-config.yml
      service: microservice-base-config

  eureka-server:
    image: "containedtogether/eureka-server"
    container_name: eureka-server
    ports:
      - "8070:8070"
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    extends:
      file: common-config.yml
      service: microservice-config-server-config
    environment:
      SPRING_APPLICATION_NAME: "eureka-server"
      OTEL_SERVICE_NAME: "eureka-server"

  gateway-server:
    image: "containedtogether/gateway-server"
    container_name: gateway-server
    ports:
      - "8072:8072"
    depends_on:
      restaurant:
        condition: service_healthy
      review:
        condition: service_healthy
      list:
        condition: service_healthy
      social-graph:
        condition: service_healthy
      user:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gateway-server"
      OTEL_SERVICE_NAME: "gateway-server"
      SPRING_DATA_REDIS_CONNECT-TIMEOUT: 2s
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 1s
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  restaurant:
    image: "containedtogether/restaurant"
    container_name: restaurants-ms
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8085'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_APPLICATION_NAME: "restaurant"
      OTEL_SERVICE_NAME: "restaurant"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  review:
    image: "containedtogether/review"
    container_name: reviews-ms
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_APPLICATION_NAME: "review"
      OTEL_SERVICE_NAME: "review"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  user:
    image: "containedtogether/user"
    container_name: users-ms
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_APPLICATION_NAME: "user"
      OTEL_SERVICE_NAME: "user"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  social-graph:
    image: "containedtogether/social-graph"
    container_name: social-graph-ms
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_APPLICATION_NAME: "social-graph"
      OTEL_SERVICE_NAME: "social-graph"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  list:
    image: "containedtogether/list"
    container_name: list-ms
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8084'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_APPLICATION_NAME: "list"
      OTEL_SERVICE_NAME: "list"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

networks:
  unavu:
    driver: "bridge"