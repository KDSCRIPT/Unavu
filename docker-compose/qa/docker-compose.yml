services:
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    extends:
      file: common-config.yml
      service: network-deploy-service

  config-server:
    image: "containedtogether/config-server"
    container_name: config-server-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config

  restaurant:
    image: "containedtogether/restaurant"
    container_name: restaurants-ms
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "restaurant"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  review:
    image: "containedtogether/review"
    container_name: reviews-ms
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "review"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  user:
    image: "containedtogether/user"
    container_name: users-ms
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "review"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  social-graph:
    image: "containedtogether/social-graph"
    container_name: social-graph-ms
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "social-graph"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  list:
    image: "containedtogether/list"
    container_name: list-ms
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "list"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

networks:
  unavu:
    driver: "bridge"