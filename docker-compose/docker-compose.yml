services:
  config-server:
    image: "containedtogether/config-server"
    container_name: config-server-ms
    ports:
      - "8071:8071"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu

  restaurants:
    image: "containedtogether/restaurants"
    container_name: restaurants-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu

  reviews:
    image: "containedtogether/reviews"
    container_name: reviews-ms
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu

  users:
    image: "containedtogether/users"
    container_name: users-ms
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu

  social-graph:
    image: "containedtogether/social-graph"
    container_name: social-graph-ms
    ports:
      - "8083:8083"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu

  list:
    image: "containedtogether/list"
    container_name: list-ms
    ports:
      - "8084:8084"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - unavu


networks:
  unavu:
    driver: "bridge"


